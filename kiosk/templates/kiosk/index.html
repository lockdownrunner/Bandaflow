{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandaFlow — Sign In</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232d6a4f'/><text y='.9em' font-size='70' x='12'>B</text></svg>" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1>BandaFlow</h1>
      <p>Kiosk Management Platform</p>
    </div>

    <p class="auth-title">Welcome back</p>

    <div id="error-msg" class="error-note"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" class="has-icon" placeholder="Enter your password" autocomplete="current-password" />
        <button type="button" class="eye-toggle" aria-label="Toggle password visibility">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" style="margin-top:8px;">
      Sign In
    </button>

    <div class="auth-links">
      <a href="/forgot-password/">Forgot password?</a>
      &nbsp;·&nbsp;
      Don't have an account? <a href="/signup/">Sign up</a>
    </div>
  </div>
</div>

<script src="{% static 'js/utils.js' %}"></script>
<script>
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      errEl.textContent = 'Please enter your username and password.';
      errEl.classList.add('show');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const data = await apiFetch('/', { method: 'POST', body: JSON.stringify({ username, password }) });
      if (data.success) {
        window.location.href = '/dashboard/';
      } else {
        errEl.textContent = data.error || 'Something went wrong.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  btn.addEventListener('click', doLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
