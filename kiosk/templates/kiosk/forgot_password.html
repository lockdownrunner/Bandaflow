{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandaFlow — Reset Password</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1>BandaFlow</h1>
      <p>Kiosk Management Platform</p>
    </div>

    <p class="auth-title">Reset your password</p>
    <p style="font-size:.875rem;color:var(--text-secondary);margin-bottom:20px;">Enter your username and choose a new password.</p>

    <div id="error-msg" class="error-note"></div>
    <div id="success-msg" class="info-note" style="display:none;"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Your username" />
      </div>
    </div>

    <div class="form-group">
      <label for="new-password">New Password</label>
      <div class="input-wrap">
        <input type="password" id="new-password" class="has-icon" placeholder="Enter new password" />
        <button type="button" class="eye-toggle" aria-label="Toggle password visibility">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="reset-btn">Reset Password</button>

    <div class="auth-links"><a href="/">Back to Sign In</a></div>
  </div>
</div>

<script src="{% static 'js/utils.js' %}"></script>
<script>
  document.getElementById('reset-btn').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const new_password = document.getElementById('new-password').value;
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');
    errEl.classList.remove('show'); sucEl.style.display = 'none';
    if (!username || !new_password) {
      errEl.textContent = 'Both fields are required.';
      errEl.classList.add('show');
      return;
    }
    const data = await apiFetch('/forgot-password/', { method: 'POST', body: JSON.stringify({ username, new_password }) });
    if (data.success) {
      sucEl.textContent = 'Password reset successfully! Redirecting to login…';
      sucEl.style.display = 'flex';
      setTimeout(() => window.location.href = '/', 2000);
    } else {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.classList.add('show');
    }
  });
</script>
</body>
</html>
